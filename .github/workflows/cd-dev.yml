name: CD Dev Deployment

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: development

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV_URL }}

      - name: Confirm Deployment
        run: echo "Deployment to DEV triggered at $(date)"