name: CD Staging Deployment

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_STAGING_URL }}

      - name: Confirm
        run: echo "Deployment to STAGING triggered at $(date)"