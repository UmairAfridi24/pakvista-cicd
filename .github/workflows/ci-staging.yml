name: CI Staging Pipeline

on:
  pull_request:
    branches: [staging]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install -g htmlhint stylelint stylelint-config-standard

      - run: htmlhint "*.html"

      - run: stylelint "*.css" || true

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + Tag Staging
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-${{ github.sha }}

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-${{ github.sha }}