name: CI Production Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install -g htmlhint stylelint stylelint-config-standard

      - run: htmlhint "*.html"

      - run: stylelint "*.css" || true

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.umairafridi24 }}
          password: ${{ secrets.dckr_pat_9jv7RiiUMizYSYzVDMRt6rCedcU }}

      - name: Build Prod Image
        run: |
          docker build -t ${{ secrets.umairafridi24 }}/pakvista:prod-latest .
          docker tag ${{ secrets.umairafridi24 }}/pakvista:prod-latest ${{ secrets.umairafridi24 }}/pakvista:prod-${{ github.sha }}

      - name: Push Images
        run: |
          docker push ${{ secrets.umairafridi24 }}/pakvista:prod-latest
          docker push ${{ secrets.umairafridi24 }}/pakvista:prod-${{ github.sha }}
