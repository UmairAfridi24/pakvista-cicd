name: CI Dev Pipeline

on:
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node (for lint tools)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install HTMLHint + Stylelint
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard

      - name: Lint HTML
        run: htmlhint "*.html"

      - name: Lint CSS
        run: stylelint "*.css" || true

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.umairafridi24 }}
          password: ${{ secrets.dckr_pat_9jv7RiiUMizYSYzVDMRt6rCedcU }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pakvista:dev-latest

      - name: Tag + Build for Dev
        run: |
          docker build -t ${{ secrets.umairafridi24 }}/pakvista:dev-latest .
          docker tag ${{ secrets.umairafridi24 }}/pakvista:dev-latest ${{ secrets.umairafridi24 }}/pakvista:dev-${{ github.sha }}

      - name: Push Image
        run: |
          docker push ${{ secrets.umairafridi24 }}/pakvista:dev-latest
          docker push ${{ secrets.umairafridi24 }}/pakvista:dev-${{ github.sha }}
